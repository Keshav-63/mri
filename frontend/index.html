<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RadSight AI — Advanced AI-powered MRI, CT, and radiology analysis. Upload your scan for instant clinical findings, patient explanations, and specialist-grade reports." />
    <meta name="theme-color" content="#0a0a14" />
    <title>RadSight AI — Intelligent Radiology Analysis</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden Google Website Translator Element -->
    <div id="google_translate_element" style="position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; overflow: hidden; opacity: 0; pointer-events: none;"></div>
    <script type="text/javascript">
      window.googleTranslateElementInit = function() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
